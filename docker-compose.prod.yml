volumes:
  build_assets:

services:
  app:
    build:
      context: .
      dockerfile: docker/prod/Dockerfile
    image: starwars-app
    container_name: planets_app
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-eu-north-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}
    volumes:
      - .:/var/www
      - build_assets:/var/www/public/build
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - app
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "sh", "-c", "pgrep -f 'php-fpm.*master' >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s

  nginx:
    image: nginx:latest
    container_name: planets_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www
      - build_assets:/var/www/public/build
      - ./docker/prod/nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - app
    depends_on:
      app:
        condition: service_healthy

  redis:
    restart: unless-stopped
    networks:
      - app

networks:
  app:
