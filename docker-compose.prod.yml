services:
  app:
    build:
      dockerfile: docker/prod/Dockerfile
    container_name: planets_app
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - AWS_DEFAULT_REGION=eu-north-1
    depends_on:
      - redis

  nginx:
    image: nginx:latest
    container_name: planets_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www
      - ./docker/prod/nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app

  redis:
    restart: unless-stopped
