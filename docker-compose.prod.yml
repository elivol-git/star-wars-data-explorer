services:
  app:
    build:
      dockerfile: docker/prod/Dockerfile
    container_name: planets_app
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-eu-north-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}
    volumes:
      - .:/var/www
    networks:
      - app
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "pgrep", "-f", "nginx"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:latest
    container_name: planets_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www
      - ./docker/prod/nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - app
    depends_on:
      app:
        condition: service_healthy

  redis:
    restart: unless-stopped
    networks:
      - app

networks:
  app:
