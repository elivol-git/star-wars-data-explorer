# ---------------------------
# HTTP → HTTPS redirect
# ---------------------------
server {
    listen 80;
    server_name star-wars.ddns.net;

    return 301 https://$host$request_uri;
}

# ---------------------------
# HTTPS server
# ---------------------------
server {
    listen 443 ssl;
    server_name star-wars.ddns.net;

    ssl_certificate /etc/letsencrypt/live/star-wars.ddns.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/star-wars.ddns.net/privkey.pem;

    root /var/www/public;
    index index.php index.html;

    # ---------------------------
    # Laravel routing
    # ---------------------------
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ---------------------------
    # Static assets
    # ---------------------------
    location /build/ {
        try_files $uri =404;
        access_log off;
        expires max;
    }

    # ---------------------------
    # PHP handling (FIXED)
    # ---------------------------
    location ~ \.php$ {
        include fastcgi_params;

        fastcgi_pass app:9000;

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
    }

    # ---------------------------
    # Security
    # ---------------------------
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
