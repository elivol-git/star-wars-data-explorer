services:
  app:
    build:
      context: .
      dockerfile: docker/dev/Dockerfile
    container_name: planets_app
    volumes:
      - .:/var/www
      - ./.env:/var/www/.env
    environment:
      APP_ENV: local
      APP_DEBUG: true
      DB_HOST: db
      REDIS_HOST: redis
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:latest
    container_name: planets_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www
      - ./docker/dev/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./docker/ssl:/etc/nginx/ssl
    depends_on:
      - app

  frontend:
    image: node:20
    container_name: planets_frontend
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"

  db:
    image: mysql:8.0
    container_name: planets_db
    environment:
      MYSQL_DATABASE: planets
      MYSQL_USER: planets_user
      MYSQL_PASSWORD: Planets@2024!Secure
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - dbdata:/var/lib/mysql

  redis:
    image: redis:7
    container_name: planets_redis

volumes:
  dbdata:
