services:
    app:
        build:
            dockerfile: docker/dev/Dockerfile
        container_name: app
        volumes:
            - .:/var/www
        networks:
            - app
        healthcheck:
          test: ["CMD", "curl", "-f", "http://localhost:9000/index.php"]
          timeout: 3s
          interval: 10s
          retries: 3
          start_period: 30s

    nginx:
        image: nginx:latest
        container_name: nginx
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ./docker/dev/nginx.conf:/etc/nginx/conf.d/default.conf
            - .:/var/www:ro
            - ./docker/ssl:/etc/nginx/ssl:ro
        networks:
            - app
        depends_on:
            app:
                condition: service_healthy

    db:
        image: mysql:8.0
        environment:
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_USER: ${DB_USERNAME}
            MYSQL_PASSWORD: ${DB_PASSWORD}
            MYSQL_ROOT_PASSWORD: root
        volumes:
            - dbdata:/var/lib/mysql
        networks:
            - app

    redis:
        image: redis:7-alpine
        networks:
            - app

networks:
    app:

volumes:
    dbdata:
    appdata:
