services:
    app:
        build:
            context: .
        volumes:
            - .:/var/www
        networks:
            - app

    nginx:
        image: nginx:latest
        networks:
            - app

    db:
        image: mysql:8.0
        environment:
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_USER: ${DB_USERNAME}
            MYSQL_PASSWORD: ${DB_PASSWORD}
            MYSQL_ROOT_PASSWORD: root
        volumes:
            - dbdata:/var/lib/mysql
        networks:
            - app

    redis:
        image: redis:7-alpine
        networks:
            - app

networks:
    app:

volumes:
    dbdata:
