version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: planets_app
    volumes:
      - .:/var/www
    environment:
      APP_ENV: local
      APP_DEBUG: true
      APP_KEY: base64:xgXvkMoyXGUdv7kgwPeyUAn8iAzNVuIy9T+6+fxtzvI=
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: planets
      DB_USERNAME: planets_user
      DB_PASSWORD: Planets@2024!Secure
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    entrypoint: ["/var/www/docker/entrypoint.sh"]

  db:
    image: mysql:8.0
    container_name: planets_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: planets
      MYSQL_USER: planets_user
      MYSQL_PASSWORD: Planets@2024!Secure
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      retries: 5
      timeout: 5s

  redis:
    image: redis:7
    container_name: planets_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
      timeout: 5s

  nginx:
    image: nginx:latest
    container_name: planets_nginx
    ports:
      - "80:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  frontend:
    image: node:20
    container_name: planets_frontend
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    depends_on:
      - app

volumes:
  dbdata: